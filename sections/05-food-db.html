// ============ BMR Formulas ============
function bmrMifflinStJeor(gender, W, H, A) {
  return gender === 'male' ? 10*W + 6.25*H - 5*A + 5 : 10*W + 6.25*H - 5*A - 161;
}

function bmrHarrisBenedictRevised(gender, W, H, A) {
  return gender === 'male' ? 88.362 + 13.397*W + 4.799*H - 5.677*A : 447.593 + 9.247*W + 3.098*H - 4.330*A;
}

function bmrWhoFaoUnu(gender, W, H, A) {
  if (gender === 'male') {
    if (A < 18) return 17.686*W + 658.2;
    if (A <= 30) return 15.057*W + 692.2;
    if (A <= 60) return 11.472*W + 873.1;
    return 11.711*W + 587.7;
  } else {
    if (A < 18) return 13.384*W + 692.6;
    if (A <= 30) return 14.818*W + 486.6;
    if (A <= 60) return 8.126*W + 845.6;
    return 9.082*W + 658.5;
  }
}

function bmrKatchMcArdle(W, bodyFatPct) {
  const LBM = W * (1 - bodyFatPct / 100);
  return 370 + 21.6 * LBM;
}

function bmrSchofield(gender, W, H, A) {
  if (gender === 'male') {
    if (A < 18) return 17.686*W + 658.2;
    if (A <= 30) return 15.057*W + 692.2;
    if (A <= 60) return 11.472*W + 873.1;
    return 11.711*W + 587.7;
  } else {
    if (A < 18) return 13.384*W + 692.6;
    if (A <= 30) return 14.818*W + 486.6;
    if (A <= 60) return 8.126*W + 845.6;
    return 9.082*W + 658.5;
  }
}

const MUSCLE_EFFICIENCY = 0.22;
const GRAVITY = 9.8;
const KCAL_PER_JOULE = 1 / 4184;

function calcExerciseCalories(ex, weightKg, reps, sets, restSec, bodyWeightKg) {
  const workPerRep = weightKg * GRAVITY * ex.rom;
  const totalWork = workPerRep * reps * sets;
  const workKcal = totalWork * KCAL_PER_JOULE / MUSCLE_EFFICIENCY;
  const activeTimeH = (reps * sets * 2.5) / 3600;
  const restTimeH = ((sets - 1) * restSec) / 3600;
  const totalTimeH = activeTimeH + restTimeH;
  const metKcal = ex.met * bodyWeightKg * Math.max(totalTimeH, activeTimeH * 1.5);
  return {
    workKcal: Math.round(workKcal * 10) / 10,
    metKcal: Math.round(metKcal * 10) / 10,
    total: Math.round((workKcal + metKcal) * 10) / 10,
    workJoules: Math.round(totalWork),
    activeTimeMin: Math.round(activeTimeH * 60 * 10) / 10,
    totalTimeMin: Math.round(totalTimeH * 60 * 10) / 10,
  };
}
